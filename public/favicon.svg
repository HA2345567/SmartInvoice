<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1ed760" />
      <stop offset="100%" stop-color="#1db954" />
    </linearGradient>
  </defs>

  {/* Ambient circular background to stand out on both dark and light browser tabs */}
  <circle cx="50" cy="50" r="48" fill="#121212" stroke="url(#favGrad)" stroke-width="3" />

  {/* Yin-Yang Logo Mark matched with Spotify Brand Gradient */}
  {/* Top Wing */}
  <path
    d="M 22 48.5 L 52 48.5 C 41 48.5, 41 31, 52 31 C 36 31, 28 48.5, 22 48.5 Z"
    fill="url(#favGrad)"
  />
  {/* Bottom Wing */}
  <path
    d="M 78 51.5 L 48 51.5 C 59 51.5, 59 69, 50 69 C 64 69, 72 51.5, 78 51.5 Z"
    fill="#ffffff"
  />
  {/* Top-Right thin arc */}
  <path
    d="M 50 31 A 19 19 0 0 1 69 50"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
  {/* Bottom-Left thin arc */}
  <path
    d="M 50 69 A 19 19 0 0 1 31 50"
    stroke="url(#favGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    fill="none"
  />
</svg>
